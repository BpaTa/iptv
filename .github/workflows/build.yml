name: build-playlist

# Пересобирает playlist.m3u раз в сутки и коммитит обратно в репу.
# Если ты загрузил эту папку в GitHub и в StreamVault указал URL
# вида https://raw.githubusercontent.com/USER/REPO/main/playlist.m3u —
# плейлист будет обновляться автоматически без твоего участия.

on:
  schedule:
    - cron: "17 3 * * *"   # каждый день в 03:17 UTC (~06:17 МСК)
  workflow_dispatch:        # ручной запуск из вкладки Actions
  push:
    paths:
      - "channels.py"
      - "build.py"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build playlist
        run: python3 build.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain playlist.m3u usb/playlist.m3u bypass-hosts.txt)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add playlist.m3u usb/playlist.m3u bypass-hosts.txt
            git commit -m "playlist: автообновление $(date -u +%Y-%m-%d)"
            git push
          else
            echo "Без изменений — пропускаю коммит."
          fi
